<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MShahzadFX - Trading Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f19;
            color: #f3f4f6;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .container { text-align: center; max-width: 600px; }
        .logo { width: 80px; height: 80px; margin: 0 auto 24px; background: linear-gradient(135deg, #38bdf8, #4B73FF); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: #fff; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        h1 span { color: #38bdf8; }
        p { color: #9ca3af; margin-bottom: 32px; line-height: 1.6; }
        .badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; background: #131a26; border: 1px solid #243146; color: #38bdf8; margin-bottom: 24px; }
        .links { display: flex; flex-direction: column; gap: 12px; }
        .links a {
            display: flex; align-items: center; justify-content: center;
            padding: 14px; border-radius: 10px; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .btn-primary { background: #38bdf8; color: #0b0f19; }
        .btn-primary:hover { background: #0ea5e9; }
        .btn-secondary { background: #131a26; color: #f3f4f6; border: 1px solid #243146; }
        .btn-secondary:hover { background: #1b2436; }
        .footer { margin-top: 48px; font-size: 13px; color: #4b5563; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">M</div>
        <h1>MShahzad<span>FX</span></h1>
        <div class="badge">Advanced Trading Platform</div>
        <p>AI-Powered Multi-Asset Algorithmic Strategy Studio with real-time backtesting, MT5 integration, and smart trading analytics.</p>
        <div class="links">
            <a href="https://github.com/Shahzad4000/MShahzadFX" class="btn-primary">View Source Code on GitHub</a>
            <a href="https://preview--mshahzadfx.lovable.app" class="btn-secondary">Launch Live App (Lovable)</a>
        </div>
        <div class="footer">Built with Lovable • TanStack Start • Supabase</div>
    </div>
</body>
</html>
